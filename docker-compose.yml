services:
  api:
    build:
      context: ./apps/api
    image: lingua-ai-api:local
    restart: unless-stopped
    environment:
      LINGUA_JWT_SECRET: ${LINGUA_JWT_SECRET:?LINGUA_JWT_SECRET is required}
      LINGUA_TTS_VOICE: ${LINGUA_TTS_VOICE:-en-US-JennyNeural}
      LINGUA_NEWAPI_API_KEY: ${LINGUA_NEWAPI_API_KEY:-}
      LINGUA_NEWAPI_BASE_URL: ${LINGUA_NEWAPI_BASE_URL:-https://newapi.aigoconnection.com/v1}
      LINGUA_NEWAPI_MODEL: ${LINGUA_NEWAPI_MODEL:-gemini-2.5-flash}
      LINGUA_ARTICLE_QUESTION_COUNT: ${LINGUA_ARTICLE_QUESTION_COUNT:-5}
    volumes:
      - ./apps/api/data:/app/data
    expose:
      - "8000"
    networks:
      - lingua_ai
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  web:
    build:
      context: ./apps/web
    image: lingua-ai-web:local
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_BIND:-127.0.0.1}:${WEB_PORT:-8080}:80"
    networks:
      - lingua_ai

networks:
  lingua_ai:
    name: lingua-ai-network
